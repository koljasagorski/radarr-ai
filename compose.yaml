version: "3.9"

services:
  radarr-ai:
    image: python:3.11-slim
    container_name: RADARR-AI-SYNOLOGY
    working_dir: /app

    environment:
      TZ: "${TZ}"
      RADARR_URL: "${RADARR_URL}"
      RADARR_API_KEY: "${RADARR_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_MODEL: "${OPENAI_MODEL}"

    volumes:
      - /volume1/docker/radarr-ai/app:/app:rw

    ports:
      - "8090:8090"

    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8090"

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    security_opt:
      - no-new-privileges:true

    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"